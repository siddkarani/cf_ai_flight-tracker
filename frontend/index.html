<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>✈️ AI Flight Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050a14; color: #e0eaff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

    #canvas-container { position: fixed; inset: 0; }
    canvas { display: block; }

    /* ── HUD ── */
    #hud {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; align-items: center; gap: 12px;
      padding: 12px 20px;
      background: linear-gradient(to bottom, rgba(5,10,20,0.95), transparent);
      z-index: 10; pointer-events: none;
    }
    #hud h1 { font-size: 1.1rem; font-weight: 700; color: #7dd3fc; letter-spacing: 1px; }
    #flight-count { font-size: 0.8rem; color: #94a3b8; margin-left: auto; }

    /* ── Search ── */
    #search-bar {
      position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
      z-index: 20; display: flex; gap: 8px; pointer-events: all;
    }
    #search-input {
      background: rgba(15,25,50,0.9); border: 1px solid #334155;
      color: #e0eaff; padding: 8px 14px; border-radius: 8px;
      font-size: 0.9rem; width: 220px; outline: none;
    }
    #search-input::placeholder { color: #64748b; }
    #search-btn {
      background: #1d4ed8; border: none; color: white;
      padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.85rem;
    }
    #search-btn:hover { background: #2563eb; }

    /* ── Flight info panel ── */
    #flight-panel {
      position: fixed; top: 70px; right: 20px; width: 280px;
      background: rgba(10,18,40,0.95); border: 1px solid #1e3a5f;
      border-radius: 12px; padding: 16px; z-index: 20; display: none;
    }
    #flight-panel h3 { color: #7dd3fc; font-size: 1rem; margin-bottom: 10px; }
    .flight-detail { display: flex; justify-content: space-between; margin: 5px 0; font-size: 0.82rem; }
    .flight-detail .label { color: #64748b; }
    .flight-detail .value { color: #e0eaff; font-weight: 500; }
    #track-btn {
      margin-top: 12px; width: 100%; background: #065f46; border: none;
      color: #6ee7b7; padding: 8px; border-radius: 8px; cursor: pointer; font-size: 0.85rem;
    }
    #track-btn:hover { background: #047857; }

    /* ── Chat ── */
    #chat-toggle {
      position: fixed; bottom: 24px; right: 24px; z-index: 30;
      background: #1d4ed8; border: none; color: white;
      width: 52px; height: 52px; border-radius: 50%; font-size: 1.4rem;
      cursor: pointer; box-shadow: 0 4px 20px rgba(29,78,216,0.5);
      display: flex; align-items: center; justify-content: center;
    }
    #chat-panel {
      position: fixed; bottom: 90px; right: 24px; width: 340px; height: 440px;
      background: rgba(10,18,40,0.97); border: 1px solid #1e3a5f;
      border-radius: 16px; display: none; flex-direction: column; z-index: 30;
      overflow: hidden;
    }
    #chat-panel.open { display: flex; }
    #chat-header {
      padding: 12px 16px; background: rgba(29,78,216,0.3);
      border-bottom: 1px solid #1e3a5f; font-size: 0.9rem; font-weight: 600; color: #7dd3fc;
    }
    #chat-messages {
      flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px;
    }
    #chat-messages::-webkit-scrollbar { width: 4px; }
    #chat-messages::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    .msg { padding: 8px 12px; border-radius: 10px; font-size: 0.83rem; line-height: 1.5; max-width: 90%; }
    .msg.user { background: #1e3a5f; align-self: flex-end; color: #e0eaff; }
    .msg.assistant { background: #0f2040; align-self: flex-start; color: #cbd5e1; border: 1px solid #1e3a5f; }
    .msg.loading { color: #64748b; font-style: italic; }
    #chat-input-row {
      display: flex; gap: 8px; padding: 10px 12px;
      border-top: 1px solid #1e3a5f;
    }
    #chat-input {
      flex: 1; background: rgba(255,255,255,0.05); border: 1px solid #334155;
      color: #e0eaff; padding: 8px 12px; border-radius: 8px; font-size: 0.83rem; outline: none;
    }
    #chat-send {
      background: #1d4ed8; border: none; color: white;
      padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 0.85rem;
    }

    /* ── Loading ── */
    #loading {
      position: fixed; inset: 0; background: #050a14;
      display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
    }
    #loading h2 { color: #7dd3fc; margin-bottom: 8px; }
    #loading p { color: #64748b; font-size: 0.85rem; }
    .spinner {
      width: 48px; height: 48px; border: 3px solid #1e3a5f;
      border-top-color: #3b82f6; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <h2>✈️ AI Flight Tracker</h2>
  <p>Loading globe & live flight data…</p>
</div>

<div id="canvas-container">
  <canvas id="globe"></canvas>
</div>

<div id="hud">
  <h1>✈️ AI FLIGHT TRACKER</h1>
  <span id="flight-count">Loading flights…</span>
</div>

<div id="search-bar">
  <input id="search-input" type="text" placeholder="Search callsign, e.g. UAL123" />
  <button id="search-btn">Search</button>
</div>

<div id="flight-panel">
  <h3 id="fp-callsign">—</h3>
  <div class="flight-detail"><span class="label">Country</span><span class="value" id="fp-country">—</span></div>
  <div class="flight-detail"><span class="label">Altitude</span><span class="value" id="fp-alt">—</span></div>
  <div class="flight-detail"><span class="label">Speed</span><span class="value" id="fp-speed">—</span></div>
  <div class="flight-detail"><span class="label">Heading</span><span class="value" id="fp-heading">—</span></div>
  <div class="flight-detail"><span class="label">Vertical Rate</span><span class="value" id="fp-vrate">—</span></div>
  <div class="flight-detail"><span class="label">Position</span><span class="value" id="fp-pos">—</span></div>
  <button id="track-btn">⭐ Track This Flight</button>
</div>

<button id="chat-toggle" title="AI Assistant">💬</button>
<div id="chat-panel">
  <div id="chat-header">🤖 AI Flight Assistant (Llama 3.3)</div>
  <div id="chat-messages">
    <div class="msg assistant">Hi! I'm your AI flight assistant. Ask me about any flight, airport, or what's flying overhead right now!</div>
  </div>
  <div id="chat-input-row">
    <input id="chat-input" type="text" placeholder="Ask about a flight…" />
    <button id="chat-send">Send</button>
  </div>
</div>

<!-- Three.js for 3D globe -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="globe.js"></script>
<script src="chat.js"></script>
</body>
</html>
